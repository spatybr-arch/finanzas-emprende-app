<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisFinanzas - Emprendedores</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; }
        
        /* Navegación */
        .nav-tabs { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .nav-link { cursor: pointer; color: #999; font-weight: bold; transition: 0.3s; padding: 5px 10px; }
        .nav-link.active { color: #2ecc71; border-bottom: 2px solid #2ecc71; }

        /* Estilos de Registro */
        .type-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .type-btn { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-weight: bold; }
        .active-ingreso { border-color: #2ecc71; color: #2ecc71; background: #e8f8f5; }
        .active-costo { border-color: #f1c40f; color: #f1c40f; background: #fef9e7; }
        .active-gasto { border-color: #e74c3c; color: #e74c3c; background: #fdedec; }

        /* Estilos de Resumen e Historial */
        .balance-card { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-top: 15px; }
        .monto-grande { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .grid-resumen { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .resumen-item { font-size: 14px; }
        .item-list { text-align: left; border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }

        input, select, .btn-main { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hidden { display: none !important; }
        .user-header { font-size: 12px; color: #aaa; text-align: right; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-section">
        <h1>MisFinanzas</h1>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button class="btn-main" onclick="signIn()">Ingresar</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="user-header">
            <span id="user-display"></span> | <a href="#" onclick="location.reload()">Salir</a>
        </div>

        <div class="nav-tabs">
            <span class="nav-link" id="tab-resumen" onclick="showTab('resumen')">Resumen</span>
            <span class="nav-link active" id="tab-registrar" onclick="showTab('registrar')">Registrar</span>
            <span class="nav-link" id="tab-historial" onclick="showTab('historial')">Historial</span>
        </div>

        <div id="view-registrar">
            <div class="type-buttons">
                <button class="type-btn active-ingreso" id="btn-ing" onclick="setType('ingreso')">+ Ingreso</button>
                <button class="type-btn" id="btn-cos" onclick="setType('costo')">- Costo</button>
                <button class="type-btn" id="btn-gas" onclick="setType('gasto')">- Gasto</button>
            </div>
            <input type="text" id="descripcion" placeholder="Descripción (ej: Venta zapatos)">
            <input type="number" id="monto" placeholder="Monto $">
            <select id="categoria">
                <option value="Ventas">Ventas</option>
                <option value="Insumos">Insumos</option>
                <option value="Varios">Varios</option>
            </select>
            <input type="date" id="fecha">
            <button class="btn-main" id="btn-save" onclick="guardar()">Guardar Movimiento</button>
        </div>

        <div id="view-resumen" class="hidden">
            <div class="balance-card">
                <small>Utilidad neta del mes</small>
                <div class="monto-grande" id="utilidad-total">$0</div>
                <div class="grid-resumen">
                    <div class="resumen-item">Ingresos<br><b style="color:green" id="res-ing">$0</b></div>
                    <div class="resumen-item">Costos<br><b style="color:orange" id="res-cos">$0</b></div>
                    <div class="resumen-item">Gastos<br><b style="color:red" id="res-gas">$0</b></div>
                </div>
            </div>
        </div>

        <div id="view-historial" class="hidden">
            <div id="lista-movimientos" style="margin-top:20px;">
                <small>Cargando movimientos...</small>
            </div>
        </div>
    </div>
</div>

<script>
    let currentType = 'ingreso';
    document.getElementById('fecha').valueAsDate = new Date();

    function setType(t) {
        currentType = t;
        document.getElementById('btn-ing').className = 'type-btn' + (t=='ingreso'?' active-ingreso':'');
        document.getElementById('btn-cos').className = 'type-btn' + (t=='costo'?' active-costo':'');
        document.getElementById('btn-gas').className = 'type-btn' + (t=='gasto'?' active-gasto':'');
        const btnSave = document.getElementById('btn-save');
        btnSave.style.background = t=='ingreso'?'#2ecc71':(t=='costo'?'#f1c40f':'#e74c3c');
    }

    function showTab(tab) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('tab-'+tab).classList.add('active');
        
        document.getElementById('view-registrar').classList.add('hidden');
        document.getElementById('view-resumen').classList.add('hidden');
        document.getElementById('view-historial').classList.add('hidden');
        
        document.getElementById('view-'+tab).classList.remove('hidden');
        
        if(tab === 'resumen') cargarResumen();
        if(tab === 'historial') cargarHistorial();
    }

    async function signIn() {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        });
        if(error) alert(error.message);
        else {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = data.user.email;
        }
    }

    async function guardar() {
        const user = (await supabaseClient.auth.getUser()).data.user;
        const mov = {
            user_id: user.id,
            tipo: currentType.substring(0,3), // 'ing', 'cos', 'gas'
            detalle: document.getElementById('descripcion').value,
            monto: parseFloat(document.getElementById('monto').value),
            cat: document.getElementById('categoria').value,
            fecha: document.getElementById('fecha').value
        };

        const { error } = await supabaseClient.from('movimientos').insert([mov]);
        if(error) alert(error.message);
        else {
            alert("¡Guardado!");
            document.getElementById('descripcion').value = "";
            document.getElementById('monto').value = "";
        }
    }

    async function cargarResumen() {
        const { data, error } = await supabaseClient.from('movimientos').select('monto, tipo');
        if(data) {
            let i = 0, c = 0, g = 0;
            data.forEach(m => {
                if(m.tipo === 'ing') i += m.monto;
                if(m.tipo === 'cos') c += m.monto;
                if(m.tipo === 'gas') g += m.monto;
            });
            document.getElementById('res-ing').innerText = "$" + i.toLocaleString();
            document.getElementById('res-cos').innerText = "$" + c.toLocaleString();
            document.getElementById('res-gas').innerText = "$" + g.toLocaleString();
            document.getElementById('utilidad-total').innerText = "$" + (i - c - g).toLocaleString();
        }
    }

    async function cargarHistorial() {
        const { data, error } = await supabaseClient.from('movimientos').select('*').order('fecha', {ascending: false});
        const lista = document.getElementById('lista-movimientos');
        lista.innerHTML = data.length ? "" : "Sin movimientos registrados";
        data.forEach(m => {
            const color = m.tipo === 'ing' ? 'green' : (m.tipo === 'cos' ? 'orange' : 'red');
            lista.innerHTML += `<div class="item-list">
                <span><b>${m.detalle}</b><br><small>${m.fecha}</small></span>
                <span style="color:${color}"><b>${m.tipo === 'ing' ? '+' : '-'}$${m.monto.toLocaleString()}</b></span>
            </div>`;
        });
    }
</script>
</body>
</html>
