<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Finanzas Emprende</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="box">
    <div id="login-section">
        <h2>Iniciar Sesión</h2>
        <input type="email" id="email" placeholder="Correo">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="entrar()">Ingresar</button>
    </div>

    <div id="panel-section" class="hidden">
        <h2 id="saludo">Hola</h2>
        <hr>
        <select id="tipo">
            <option value="ing">Ingreso (+)</option>
            <option value="gas">Gasto (-)</option>
        </select>
        <input type="text" id="detalle" placeholder="¿En qué?">
        <input type="number" id="monto" placeholder="Valor">
        <button style="background: #28a745;" onclick="guardar()">Guardar Movimiento</button>
        <button style="background: #6c757d;" onclick="location.reload()">Salir</button>
    </div>
</div>

<script>
    async function entrar() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });

        if (error) {
            alert("Error: " + error.message);
        } else {
            // Esto es lo que hace que aparezca el panel
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('panel-section').classList.remove('hidden');
            document.getElementById('saludo').innerText = "Bienvenido: " + data.user.email;
        }
    }

    async function guardar() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const m = {
            user_id: user.id,
            tipo: document.getElementById('tipo').value,
            detalle: document.getElementById('detalle').value,
            monto: parseFloat(document.getElementById('monto').value),
            fecha: new Date().toISOString()
        };

        const { error } = await supabaseClient.from('movimientos').insert([m]);
        if (error) alert("Error al guardar: " + error.message);
        else {
            alert("✅ ¡Guardado con éxito!");
            document.getElementById('detalle').value = "";
            document.getElementById('monto').value = "";
        }
    }
</script>

</body>
</html>
