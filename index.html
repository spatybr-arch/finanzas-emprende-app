<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisFinanzas - Emprendedores</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        /* TU DISEÑO ORIGINAL ADAPTADO */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
        
        /* Estilos para Inputs y Selects */
        label { display: block; text-align: left; margin-bottom: 8px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input:focus, select:focus { border-color: #2ecc71; outline: none; }
        
        /* Botones de Tipo de Movimiento (como en tu imagen 2) */
        .type-buttons { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 10px; }
        .type-btn { flex: 1; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; background-color: #fff; color: #555; font-weight: bold; cursor: pointer; transition: all 0.3s; font-size: 16px; }
        .type-btn:hover { border-color: #2ecc71; color: #2ecc71; }
        .type-btn.active-ingreso { background-color: #e8f8f5; border-color: #2ecc71; color: #27ae60; }
        .type-btn.active-costo { background-color: #fef9e7; border-color: #f1c40f; color: #b7950b; }
        .type-btn.active-gasto { background-color: #fdedec; border-color: #e74c3c; color: #c0392b; }

        /* Botón Guardar Principal */
        .btn-save { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; }
        .btn-save:hover { background-color: #27ae60; }
        
        /* Utilidades */
        .hidden { display: none !important; }
        .user-info { background-color: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; color: #777; display: flex; justify-content: space-between; align-items: center;}
        .btn-logout { background: none; border: 1px solid #ccc; color: #777; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        /* SECCIÓN LOGIN INICIAL */
        .login-box { text-align: center; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="auth-section">
        <img src="https://supabase.com/dashboard/img/supabase-logo.svg" width="80" alt="Supabase Logo" style="margin-bottom:20px;">
        <h1>Control de Finanzas</h1>
        <p class="subtitle">Ingresa para gestionar tu negocio</p>
        
        <input type="email" id="email" placeholder="Correo electrónico del negocio" required>
        <input type="password" id="password" placeholder="Contraseña segura" required>
        
        <button class="btn-save" onclick="signIn()">Iniciar Sesión</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="user-info">
            <span id="user-display">Cargando usuario...</span>
            <button class="btn-logout" onclick="logOut()">Salir</button>
        </div>

        <h1>MisFinanzas</h1>
        <p class="subtitle">Lleva tus cuentas claras</p>

        <div style="display:flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: #2ecc71; font-weight: bold;">
            <span>Resumen</span>
            <span style="border-bottom: 2px solid #2ecc71;">Registrar</span>
            <span>Historial</span>
        </div>

        <label>Tipo de movimiento</label>
        <div class="type-buttons">
            <button type="button" class="type-btn" id="btn-ingreso" onclick="selectType('ingreso')">+ Ingreso</button>
            <button type="button" class="type-btn" id="btn-costo" onclick="selectType('costo')">- Costo</button>
            <button type="button" class="type-btn" id="btn-gasto" onclick="selectType('gasto')">- Gasto</button>
        </div>
        <input type="hidden" id="tipo_movimiento" value="ingreso"> <label for="descripcion">Descripción</label>
        <input type="text" id="descripcion" placeholder="Ej: Venta de producto, Arriendo, Pago proveedores..." required>

        <label for="monto">Monto</label>
        <input type="number" id="monto" placeholder="0" required style="font-size: 20px; font-weight: bold; text-align: center;">

        <label for="categoria">Categoría</label>
        <select id="categoria" required>
            <option value="" disabled selected>Seleccionar...</option>
            <option value="ventas">Ventas</option>
            <option value="servicios">Servicios</option>
            <option value="insumos">Insumos/Materia Prima</option>
            <option value="arriendo">Arriendo Local</option>
            <option value="servicios_publicos">Servicios Públicos</option>
            <option value="nomina">Nómina/Sueldos</option>
            <option value="marketing">Marketing/Publicidad</option>
            <option value="transporte">Transporte/Logística</option>
            <option value="impuestos">Impuestos</option>
            <option value="otros">Otros</option>
        </select>

        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" required>

        <button class="btn-save" id="btn-guardar" onclick="guardarMovimiento()">Guardar movimiento</button>
    </div>
</div>

<script>
    // Establecer fecha de hoy por defecto al cargar
    document.getElementById('fecha').valueAsDate = new Date();
    let currentType = 'ingreso'; // Tipo por defecto

    // --- FUNCIÓN 1: LÓGICA DE INTERFAZ (Selección de botones) ---
    function selectType(type) {
        currentType = type;
        document.getElementById('tipo_movimiento').value = type;
        
        // Resetear estilos de todos los botones
        const buttons = document.querySelectorAll('.type-btn');
        buttons.forEach(btn => btn.className = 'type-btn');

        // Aplicar estilo activo según el tipo seleccionado
        const btn = document.getElementById('btn-' + type);
        if (type === 'ingreso') btn.classList.add('active-ingreso');
        if (type === 'costo') btn.classList.add('active-costo');
        if (type === 'gasto') btn.classList.add('active-gasto');
        
        // Opcional: Cambiar color del botón guardar para coincidir
        const saveBtn = document.getElementById('btn-guardar');
        if (type === 'ingreso') saveBtn.style.backgroundColor = '#2ecc71';
        if (type === 'costo') saveBtn.style.backgroundColor = '#f1c40f';
        if (type === 'gasto') saveBtn.style.backgroundColor = '#e74c3c';
    }
    // Inicializar el primer botón como activo (Ingreso)
    selectType('ingreso'); 


    // --- FUNCIÓN 2: INICIO DE SESIÓN CON SUPABASE ---
    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            alert("Error de acceso: " + error.message);
        } else {
            // Login exitoso: Cambiar de vista
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = data.user.email;
        }
    }

    // --- FUNCIÓN 3: CERRAR SESIÓN ---
    async function logOut() {
        await supabaseClient.auth.signOut();
        location.reload(); // Recargar la página para volver al login
    }

    // --- FUNCIÓN 4: GUARDAR DATOS EN LA BASE DE DATOS (SUPABASE) ---
    async function guardarMovimiento() {
        // 1. Obtener el ID del usuario logueado (necesario para la seguridad RLS)
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { alert("Sesión expirada. Por favor reingresa."); logOut(); return; }

        // 2. Recolectar datos del formulario
        const movimiento = {
            user_id: user.id, // Enlazamos el movimiento a ESTE usuario
            tipo: currentType, // 'ingreso', 'costo', o 'gasto'
            descripcion: document.getElementById('descripcion').value,
            monto: parseFloat(document.getElementById('monto').value),
            categoria: document.getElementById('categoria').value,
            fecha: document.getElementById('fecha').value
        };

        // 3. Validaciones básicas
        if (!movimiento.descripcion || !movimiento.monto || !movimiento.categoria || !movimiento.fecha) {
            alert("Por favor completa todos los campos.");
            return;
        }

        // 4. Insertar datos en Supabase (Tabla 'movimientos')
        document.getElementById('btn-guardar').innerText = "Guardando...";
        document.getElementById('btn-guardar').disabled = true;

        const { error } = await supabaseClient
            .from('movimientos')
            .insert([movimiento]);

        // 5. Manejar resultado
        document.getElementById('btn-guardar').innerText = "Guardar movimiento";
        document.getElementById('btn-guardar').disabled = false;

        if (error) {
            alert("Error al guardar en la base de datos: " + error.message);
            console.error(error);
        } else {
            alert("✅ ¡Movimiento registrado con éxito!");
            // Limpiar formulario (excepto fecha y tipo)
            document.getElementById('descripcion').value = '';
            document.getElementById('monto').value = '';
            document.getElementById('categoria').value = '';
        }
    }
</script>

</body>
</html>
